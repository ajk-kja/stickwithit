<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050506">
<link rel="icon" type="image/png" href="/assets/favicon-256.png" sizes="256x256">
<link rel="apple-touch-icon" href="/assets/favicon-256.png">
<title>Stick With It — Live drums &amp; the monthly contest</title>
<meta name="description" content="Watch live, play along to this month's track, and submit your clip to the contest.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Stick With It">
<meta property="og:title" content="Live drums &amp; the monthly contest">
<meta property="og:description" content="Watch live, play along to this month's track, and submit your clip to the contest.">
<meta property="og:url" content="https://stickwithit.xyz/">
<meta property="og:image" content="https://stickwithit.xyz/assets/favicon-256.png">
<meta property="og:image:width" content="256">
<meta property="og:image:height" content="256">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Live drums &amp; the monthly contest">
<meta name="twitter:description" content="Watch live, play along to this month's track, and submit your clip to the contest.">
<meta name="twitter:image" content="https://stickwithit.xyz/assets/favicon-256.png">
<link rel="stylesheet" href="/app.css?v=20260713a">
<link rel="stylesheet" href="/vhs.css?v=20260713a">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js" defer></script>
<script src="/app.js?v=20260713b" defer></script>
<style>
  .home-grid{display:grid;gap:16px;grid-template-columns:1fr;grid-template-areas:"player" "chat" "vote" "contest";}
  @media(min-width:860px){.home-grid{grid-template-columns:1fr 1fr;grid-template-areas:"player player" "chat contest" "vote vote";align-items:start;}}
  .ga-player{grid-area:player}.ga-chat{grid-area:chat}.ga-vote{grid-area:vote}.ga-contest{grid-area:contest}
  .ga-chat{min-height:210px}
  #player-status:empty{display:none}
</style></head><body class="vhs-mock">
<header class="chrome"><div class="chrome-in">
  <a class="brand" href="/"><img class="mk-img" src="/assets/StickWithItBlack.png" alt="" height="30" style="height:30px;width:auto" decoding="async">Stick With It</a>
  <nav class="desknav">
    <a class="live" href="/" aria-current="page"><span class="dot"></span>LIVE</a>
    <a href="/contest/">Contest</a><a href="/artists/">Artists</a><a href="/more/">More</a>
  </nav>
</div></header>

<main class="wrap page">
  <div class="home-grid">
    <div class="ga-player player">
      <video id="player" playsinline muted autoplay poster="/assets/favicon-256.png"></video>
      <span class="badge is-off" id="live-badge"><span class="dot" style="background:var(--dim)"></span>OFFLINE</span>
      <button class="sound" id="sound-btn" type="button" aria-label="Unmute the live stream" title="Unmute">🔇</button>
      <button class="expand" id="expand-btn" type="button" aria-label="Fullscreen the player">⤢</button>
    </div>

    <div class="ga-chat chat live-chat" id="live-chat">
      <div class="ch"><span>Live chat</span><span class="who" id="chat-state">Connecting</span></div>
      <div class="cm chat-messages" id="chat-messages" aria-live="polite"></div>
      <form class="ci chat-compose" id="chat-form" autocomplete="off">
        <input class="chat-name" id="chat-name" name="name" maxlength="24" placeholder="Name" aria-label="Chat name">
        <input class="box chat-text" id="chat-text" name="text" maxlength="300" placeholder="Say something..." aria-label="Chat message">
        <button class="snd" id="chat-send" type="submit" aria-label="Send chat message">➤</button>
      </form>
      <div class="soon chat-status" id="chat-status"></div>
    </div>

    <section class="ga-vote">
      <div class="sh"><h2>Vote this month</h2><span>1 vote / day</span></div>
      <div class="voterail" id="vote-rail"><div class="empty">Loading entries…</div></div>
    </section>

    <aside class="ga-contest pill">
      <span class="eyebrow" id="contest-eyebrow">This month's contest</span>
      <div class="cd" id="countdown"></div>
      <div class="track" id="track" data-label="Play-along track"></div>
      <div class="contest-prizes compact" id="contest-prizes"></div>
      <ol class="steps"><li><b>Play along</b> to the track</li><li><b>Record</b> your take</li><li><b>Submit</b> — right here</li></ol>
      <a class="submit" href="/contest/">Learn more →</a>
    </aside>
  </div>
</main>

<nav class="tabbar">
  <a class="live" href="/" aria-current="page"><span class="ic">●</span>LIVE</a>
  <a href="/contest/"><span class="ic">◎</span>Contest</a>
  <a href="/artists/"><span class="ic">♪</span>Artists</a>
  <a href="/more/"><span class="ic">≡</span>More</a>
</nav>
</body></html>

  <style>
    :root {
      --swi-toolbar-h: 46px;
    }
    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--swi-bg);
    }
    body.swi-gigasector-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      margin: 0;
      color: var(--swi-fg);
    }
    #app {
      width: 100%;
      height: calc(100svh - var(--swi-toolbar-h) - env(safe-area-inset-top));
      height: calc(100dvh - var(--swi-toolbar-h) - env(safe-area-inset-top));
      min-height: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }
    @media (max-width: 640px) {
      #app .bg-dark.px-3.py-2 {
        padding-top: 0.45rem;
        padding-bottom: 0.45rem;
      }
      #app .bg-dark.px-3.py-2 h1 {
        font-size: 1.05rem;
        line-height: 1.25rem;
      }
      #app .waveform-section {
        height: clamp(86px, 18svh, 124px);
        min-height: 82px;
      }
      #app .p-4 {
        padding: 0.72rem;
      }
      #app .py-4 {
        padding-top: 0.65rem;
        padding-bottom: 0.65rem;
      }
      #app .mb-4 {
        margin-bottom: 0.65rem;
      }
      #app .text-2xl {
        font-size: 1.16rem;
        line-height: 1.35rem;
      }
      #app #markers-container {
        min-height: 0;
        overflow-y: auto;
      }
      #app #player-container > div,
      #app #upload-container > div,
      #app #setlist-container > div {
        min-height: 0;
      }
    }
    @media (max-height: 720px) {
      #app .waveform-section {
        height: 82px;
        min-height: 78px;
      }
      #app .min-h-\[160px\] {
        min-height: 118px;
      }
      #app .text-6xl {
        font-size: 2.6rem;
        line-height: 1;
      }
    }
    html[data-theme="light"] #app .bg-dark,
    html[data-theme="light"] #app .bg-darker,
    html[data-theme="light"] #app .bg-black,
    html[data-theme="light"] #app .bg-gray-800,
    html[data-theme="light"] #app .bg-gray-700 {
      background-color: var(--swi-panel) !important;
    }
    html[data-theme="light"] #app .border-gray-800,
    html[data-theme="light"] #app .border-gray-700,
    html[data-theme="light"] #app .divide-gray-800 > :not([hidden]) ~ :not([hidden]) {
      border-color: var(--swi-border) !important;
    }
    html[data-theme="light"] #app .text-white,
    html[data-theme="light"] #app .text-gray-300 {
      color: var(--swi-fg) !important;
    }
    html[data-theme="light"] #app .text-gray-400,
    html[data-theme="light"] #app .text-gray-500 {
      color: var(--swi-muted) !important;
    }
  </style>

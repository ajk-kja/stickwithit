<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050506">
  <link rel="icon" type="image/png" href="/assets/StickWithItBlack.png" sizes="256x256">
  <title>Stick With It — Live drums &amp; the monthly clip contest</title>
  <meta name="description" content="Watch live, play along to this month's track, and submit your clip to the contest.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/test/home.css?v=20260708c">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js" defer></script>
  <script src="/test/app.js?v=20260708c" defer></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="/test/" aria-label="Stick With It home">
        <img class="brand-mark" src="/assets/StickWithItBlack.png" alt="">
        <span>Stick With It</span>
      </a>
    </header>

    <main class="feed">
      <!-- Live player -->
      <section class="player-sec" aria-label="Live stream">
        <div class="player-card">
          <video id="player" playsinline muted autoplay poster="/assets/StickWithItBlack.png"></video>
          <span class="badge is-off" id="live-badge">● OFFLINE</span>
          <button class="expand" id="expand-btn" type="button" aria-label="Fullscreen the player">⤢</button>
        </div>
        <p class="player-status" id="player-status" role="status" aria-live="polite"></p>
      </section>

      <!-- Vote this month -->
      <section class="vote-sec" aria-label="Vote this month">
        <div class="sec-head"><h2>Vote this month</h2><span>1 vote / day</span></div>
        <div class="vote-rail" id="vote-rail"><div class="empty">Loading entries…</div></div>
      </section>

      <!-- Contest pill -->
      <section class="contest-sec" aria-label="This month's contest">
        <div class="pill">
          <span class="eyebrow" id="contest-eyebrow">This month's contest</span>
          <div class="countdown" id="countdown" aria-live="polite"></div>
          <div class="track" id="track"></div>
          <ol class="steps">
            <li><b>Play along</b> to the track</li>
            <li><b>Record</b> your take</li>
            <li><b>Submit</b> — right here</li>
          </ol>
          <a class="submit" href="/submit/">Submit your clip →</a>
        </div>
      </section>
    </main>

    <nav class="tabbar" aria-label="Primary">
      <a class="tab is-active" href="/test/" aria-current="page"><span class="ti" aria-hidden="true">⌂</span>Home</a>
      <a class="tab" href="/contest/"><span class="ti" aria-hidden="true">◎</span>Contest</a>
      <a class="tab" href="/drummers/"><span class="ti" aria-hidden="true">♪</span>Artists</a>
      <button class="tab" id="more-btn" type="button" aria-haspopup="true" aria-expanded="false"><span class="ti" aria-hidden="true">≡</span>More</button>
    </nav>
  </div>

  <div class="more-sheet" id="more-sheet" hidden>
    <div class="more-panel" role="dialog" aria-label="More">
      <div class="more-grab"></div>
      <div class="more-title">Apps</div>
      <a href="/apps/metrognome/">MetroGnome</a>
      <a href="/apps/chopmeister/">Chopmeister</a>
      <a href="/apps/gigasector/">Gigasector</a>
      <a href="/apps/rudimentor/">Rudimentor</a>
      <div class="more-title">More</div>
      <a href="/store/">Store</a>
      <a href="/blog/">Blog</a>
    </div>
  </div>
</body>
</html>

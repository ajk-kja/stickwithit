<!doctype html>
<html lang="en" class="is-hidden"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Stick With It chat overlay</title>
<style>
  :root{--fg:#fff;--muted:rgba(255,255,255,.76);--shadow:rgba(0,0,0,.82)}
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;background:transparent;overflow:hidden}
  body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--fg)}
  #chat{position:fixed;left:28px;right:28px;bottom:26px;display:flex;flex-direction:column;gap:10px;opacity:1;visibility:visible;transition:opacity .22s ease}
  html.is-hidden #chat{opacity:0;visibility:hidden;pointer-events:none}
  .m{display:grid;grid-template-columns:30px minmax(0,auto) minmax(0,1fr);gap:11px;align-items:baseline;
    font-size:31px;line-height:1.18;font-weight:750;text-shadow:0 2px 7px var(--shadow),0 0 2px #000;overflow-wrap:anywhere}
  .m:nth-last-child(8){opacity:.28}.m:nth-last-child(7){opacity:.36}.m:nth-last-child(6){opacity:.48}.m:nth-last-child(5){opacity:.62}
  .m:nth-last-child(4){opacity:.76}.m:nth-last-child(3){opacity:.88}
  .src{width:30px;height:30px;display:inline-grid;place-items:center;transform:translateY(3px)}
  .src svg{width:30px;height:30px;filter:drop-shadow(0 2px 4px #000)}
  .src-web{font-size:26px}
  b{color:#ff6b76;white-space:nowrap}
  .source-discord b{color:#9aa3ff}.source-twitch b{color:#bf94ff}.source-web b{color:#7dd3fc}
  .txt{min-width:0;color:var(--fg)}
  @media(max-width:900px){#chat{left:18px;right:18px;bottom:18px}.m{font-size:24px;grid-template-columns:24px minmax(0,auto) minmax(0,1fr);gap:9px}.src,.src svg{width:24px;height:24px}.src-web{font-size:21px}}
</style>
</head><body>
<div id="chat" aria-live="polite"></div>
<script>
(() => {
  "use strict";
  const icons = {
    twitch: '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#9146ff" d="M4 3h17v11.7l-4.8 4.8h-3.7L9.8 22H7v-2.5H3V6.8L4 3Zm2 2v12.5h4v1.8l1.8-1.8h3.4L19 13.7V5H6Zm4.5 3.1h2v5.6h-2V8.1Zm5 0h2v5.6h-2V8.1Z"/></svg>',
    discord: '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#5865f2" d="M19.7 5.4A16.7 16.7 0 0 0 15.6 4l-.2.3c-.2.4-.4.8-.5 1.2a15.6 15.6 0 0 0-5.8 0 8 8 0 0 0-.7-1.5 16.7 16.7 0 0 0-4.1 1.4C1.7 9.3 1 13.2 1.4 17c1.7 1.3 3.4 2 5 2.4.4-.5.8-1.1 1.1-1.8-.6-.2-1.1-.5-1.7-.8l.4-.3c3.3 1.5 6.8 1.5 10 0l.4.3c-.5.3-1.1.6-1.7.8.3.7.7 1.3 1.1 1.8 1.7-.5 3.4-1.2 5.1-2.4.5-4.4-.8-8.2-3.4-11.6ZM8.4 14.7c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Zm7.2 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Z"/></svg>',
    web: '<span class="src-web" aria-hidden="true">🥁</span>'
  };
  const el = document.getElementById("chat");
  const seen = new Set();
  function setVisible(enabled) {
    document.documentElement.classList.toggle("is-hidden", !enabled);
    el.setAttribute("aria-hidden", enabled ? "false" : "true");
  }
  async function refreshState() {
    try {
      const res = await fetch("/api/chat/state?ts=" + Date.now(), { cache:"no-store" });
      const data = await res.json();
      if (typeof data.overlay_enabled === "boolean") setVisible(data.overlay_enabled);
    } catch (e) {}
  }
  function add(msg) {
    if (!msg || !msg.id || seen.has(msg.id)) return;
    seen.add(msg.id);
    const row = document.createElement("div");
    const source = String(msg.source || "web").replace(/[^a-z]/g, "");
    row.className = "m source-" + source;
    const icon = document.createElement("span");
    icon.className = "src";
    icon.innerHTML = icons[source] || icons.web;
    const user = document.createElement("b");
    user.textContent = String(msg.user || "guest");
    const text = document.createElement("span");
    text.className = "txt";
    text.textContent = String(msg.text || "");
    row.append(icon, user, text);
    el.append(row);
    while (el.children.length > 8) el.firstElementChild.remove();
  }
  if ("EventSource" in window) {
    const es = new EventSource("/api/chat/events");
    es.onmessage = (ev) => { try { add(JSON.parse(ev.data)); } catch (e) {} };
    es.addEventListener("message", (ev) => { try { add(JSON.parse(ev.data)); } catch (e) {} });
  } else {
    fetch("/api/chat/recent", { cache:"no-store" }).then((r) => r.json()).then((d) => {
      if (typeof d.overlay_enabled === "boolean") setVisible(d.overlay_enabled);
      (d.messages || []).forEach(add);
    }).catch(() => {});
  }
  refreshState();
  setInterval(refreshState, 1500);
})();
</script>
</body></html>

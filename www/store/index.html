<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/assets/StickWithItBlack.png" sizes="256x256">
<title>Store | Stick With It</title>
<style>
  @import url("/assets/site.css?v=20260706b");
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--swi-bg);
    color: var(--swi-fg);
    font-family: var(--swi-font);
  }
  .wrap {
    width: min(1080px, 100%);
    margin: 0 auto;
    padding: clamp(42px, 8vw, 92px) 16px;
  }
  main { display: grid; gap: 24px; }
  .eyebrow {
    color: var(--swi-accent);
    font-size: 0.78rem;
    font-weight: 820;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .head {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 18px;
  }
  h1 {
    max-width: 11ch;
    margin-top: 8px;
    font-size: clamp(2.6rem, 8vw, 5.6rem);
    line-height: 0.95;
    letter-spacing: 0;
  }
  p {
    max-width: 58ch;
    color: var(--swi-muted);
    font-size: 1rem;
    line-height: 1.7;
  }
  .actions { display: flex; flex-wrap: wrap; gap: 10px; }
  .actions a {
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 1rem;
    border: 1px solid var(--swi-border-strong);
    border-radius: var(--swi-radius);
    color: var(--swi-fg);
    text-decoration: none;
    font-size: 0.86rem;
    font-weight: 760;
  }
  .actions a.primary {
    border-color: var(--swi-accent);
    background: var(--swi-accent-deep);
    color: #fff;
  }
  .products {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }
  .product, .empty {
    border: 1px solid var(--swi-border);
    border-radius: 8px;
    background: var(--swi-panel);
  }
  .product {
    color: inherit;
    text-decoration: none;
    overflow: hidden;
  }
  .product:hover { border-color: var(--swi-accent); background: rgba(230, 57, 70, 0.12); }
  .product img, .ph {
    width: 100%;
    aspect-ratio: 16 / 10;
    display: grid;
    place-items: center;
    object-fit: cover;
    background: var(--swi-bg-elevated);
    color: var(--swi-dim);
    font-weight: 850;
  }
  .product div, .empty {
    display: grid;
    gap: 8px;
    padding: 14px;
  }
  .product strong { font-size: 1rem; line-height: 1.25; }
  .product span, .empty { color: var(--swi-muted); font-size: 0.9rem; line-height: 1.5; }
  .price { color: var(--swi-fg) !important; font-weight: 820; }
  @media (max-width: 860px) {
    .head { align-items: start; flex-direction: column; }
    .products { grid-template-columns: 1fr; }
  }
</style>
<link rel="stylesheet" href="/assets/nav.css?v=20260707a">
<script src="/assets/nav.js?v=20260707b" defer></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9142348904039164" crossorigin="anonymous"></script>
</head>
<body>
  <div class="wrap">
    <main>
      <div class="head">
        <div>
          <p class="eyebrow">Merch</p>
          <h1>Stick With It Store</h1>
        </div>
        <div class="actions">
          <a class="primary" href="/#store">Featured drops</a>
        </div>
      </div>
      <p>Merch, downloads, and drummer essentials.</p>
      <div id="products" class="products"><div class="empty" aria-label="Loading store"></div></div>
    </main>
  </div>
  <script>
    const esc = (value) => String(value || "").replace(/[&<"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", '"': "&quot;" }[char]));
    async function loadMarket() {
      const wrap = document.getElementById("products");
      try {
        const response = await fetch("/assets/data/market.json?ts=" + Date.now(), { cache: "no-store" });
        const data = await response.json();
        const products = (Array.isArray(data.products) ? data.products : []).filter((product) => product.active !== false);
        wrap.innerHTML = products.length ? products.map((product) => `
          <a class="product" href="${esc(product.url)}" target="_blank" rel="noopener">
            ${product.image ? `<img src="${esc(product.image)}" alt="${esc(product.title)}">` : '<span class="ph">SWI</span>'}
            <div>
              <strong>${esc(product.title)}</strong>
              ${product.blurb ? `<span>${esc(product.blurb)}</span>` : ""}
              ${product.price ? `<span class="price">${esc(product.price)}</span>` : ""}
            </div>
          </a>`).join("") : '<div class="empty">Drops open soon.</div>';
      } catch {
        wrap.innerHTML = '<div class="empty">Store unavailable.</div>';
      }
    }
    loadMarket();
  </script>
</body>
</html>

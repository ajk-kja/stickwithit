<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rudimentor | Stick With It</title>
  <link rel="icon" type="image/png" href="/assets/StickWithItBlack.png" sizes="256x256">
  <link rel="shortcut icon" href="/assets/StickWithItBlack.png">
  <meta name="theme-color" content="#000000">
  <style>
    :root {
      --bg: #020203;
      --surface: #070708;
      --surface-2: #0f0f13;
      --border: #1a1a21;
      --border-strong: #272730;
      --text: #f5f5f7;
      --muted: #8c8d98;
      --accent: #e63946;
      --accent-blue: #3c98ff;
      --shadow: rgba(0, 0, 0, 0.65);
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .app-shell {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: clamp(1rem, 4vw, 2.5rem);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @media (max-width: 768px) {
      .app-shell {
        padding: 1rem;
      }
    }

    .header {
      padding: 1rem 1.25rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }

    .tabs {
      margin: 0 1.25rem 1.25rem;
      background: var(--surface-2);
      border-radius: 18px;
      padding: 0.35rem;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border: 1px solid var(--border);
    }

    .tab-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.65rem 0.75rem;
      border-radius: 14px;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #0f0f15;
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border-strong);
    }

    .panel-wrapper {
      flex: 1;
      padding: 0 1.25rem 1.5rem;
      overflow-y: auto;
      display: none;
    }

    .panel-wrapper.active { display: block; }

    .stack-card {
      background: var(--surface-2);
      border-radius: 22px;
      border: 1px solid var(--border);
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .selector-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .selector {
      flex: 1;
      min-width: 140px;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .selector label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border-strong);
      background: #0f0f15;
      color: var(--text);
      padding: 0.65rem 0.75rem;
      font-size: 0.95rem;
    }

    .sheet-card {
      border-radius: 20px;
      border: 1px solid var(--border-strong);
      background: #08080b;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .sheet-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
    }

    .tier-pill {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .rudiment-name {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
    }

    .sheet-canvas {
      width: 100%;
      height: 150px;
      position: relative;
    }

    .sheet-canvas svg {
      width: 100%;
      height: 100%;
    }

    .sticking-track {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(48px, 1fr));
      gap: 0.5rem;
    }

    .sticking-cell {
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 0.65rem 0.4rem;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.1em;
      position: relative;
    }

    .sticking-cell.hand-right {
      background: rgba(230, 57, 70, 0.2);
      border-color: rgba(230, 57, 70, 0.45);
      color: var(--accent);
    }

    .sticking-cell.hand-left {
      background: rgba(60, 152, 255, 0.18);
      border-color: rgba(60, 152, 255, 0.4);
      color: var(--accent-blue);
    }

    .sticking-cell.active {
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
      transform: scale(1.02);
    }

    .sticking-cell.accented {
      background: linear-gradient(135deg, #ffffff, rgba(245, 245, 247, 0.8));
      border-color: #ffffff;
      color: #0b0b0e;
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2), 0 0 12px rgba(230, 57, 70, 0.35);
    }

    .sheet-note {
      transition: transform 0.2s ease;
    }

    .sheet-note .vf-notehead path {
      transition: fill 0.2s ease, filter 0.2s ease;
    }

    .sheet-note.active .vf-notehead path {
      fill: #f5f5f7;
    }

    .sheet-note.accented .vf-notehead path {
      fill: var(--accent);
      filter: drop-shadow(0 0 10px rgba(230, 57, 70, 0.5));
    }

    .sheet-note.accented {
      transform: scale(1.05);
    }

    .sticking-cell .ghost {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 0.55rem;
      color: var(--muted);
    }

    .play-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      background: radial-gradient(circle at 30% 30%, rgba(230, 57, 70, 0.8), var(--accent));
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.1em;
      align-self: center;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(230, 57, 70, 0.35);
    }

    .play-btn.playing {
      filter: brightness(1.1);
    }

    .slider-block {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: #1d1d22;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(230,57,70,0.25);
      cursor: pointer;
    }

    .switch-row {
      display: flex;
      gap: 0.75rem;
    }

    .switch {
      flex: 1;
      border-radius: 16px;
      border: 1px solid var(--border-strong);
      background: #0f0f15;
      color: var(--muted);
      padding: 0.65rem 0.75rem;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .switch.active {
      border-color: var(--accent);
      color: var(--text);
    }

    .grid-block {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .grid-label {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .grid-accent {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.5rem;
    }

    .grid-btn {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #101017;
      color: var(--text);
      padding: 0.6rem 0;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    .grid-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid-btn.disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .quiz-card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .chip-row {
      display: flex;
      gap: 0.4rem;
    }

    .chip {
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #0f0f15;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--accent);
      color: var(--text);
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.5rem;
    }

    .score-tile {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #101017;
      padding: 0.75rem;
      text-align: center;
    }

    .score-tile span {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .score-tile strong {
      display: block;
      font-size: 1.8rem;
      margin-top: 0.2rem;
    }

    .quiz-sheet {
      border-radius: 20px;
      border: 1px solid var(--border-strong);
      background: #08080b;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .quiz-sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .quiz-sheet-canvas {
      width: 100%;
      height: 120px;
    }

    .ghost-btn {
      flex: 0 0 auto;
      min-width: 96px;
      border-radius: 14px;
      padding: 0.5rem 0.9rem;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }

    .quiz-feedback {
      min-height: 1.2rem;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .quiz-feedback.active.success {
      color: #7dd87d;
    }

    .quiz-feedback.active.error {
      color: #ff7373;
    }

    .quiz-choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.65rem;
    }

    .quiz-choice {
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #0f0f15;
      color: var(--text);
      padding: 0.75rem 0.9rem;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .quiz-choice.correct {
      border-color: #7dd87d;
      background: rgba(125, 216, 125, 0.15);
    }

    .quiz-choice.incorrect {
      border-color: #ff7373;
      background: rgba(255, 115, 115, 0.1);
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <a href="/">← Stick With It</a>
      <span>Rudimentor</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-view="mentor">Mentor</button>
      <button class="tab-btn" data-view="quiz">Quiz</button>
    </div>

    <section class="panel-wrapper active" data-panel="mentor">
      <div class="stack-card">
        <div class="selector-row">
          <div class="selector">
            <label for="tierSelect">Difficulty</label>
            <select id="tierSelect"></select>
          </div>
          <div class="selector">
            <label for="rudimentSelect">Rudiment</label>
            <select id="rudimentSelect"></select>
          </div>
        </div>
        <div class="sheet-card">
          <div class="sheet-meta">
            <span class="tier-pill" id="tierLabel">Easy</span>
            <h2 class="rudiment-name" id="rudimentName">Single Stroke Roll</h2>
          </div>
          <div class="sheet-canvas" id="sheetCanvas"></div>
        </div>
        <div class="sticking-track" id="stickingTrack"></div>
        <button class="play-btn" id="playBtn">Play</button>
        <div class="slider-block">
          <div class="slider-label">
            <span>Tempo</span>
            <span id="tempoValue">120 BPM</span>
          </div>
          <input type="range" id="tempoSlider" min="50" max="220" value="120">
        </div>
        <div class="slider-block">
          <div class="slider-label">
            <span>Swing</span>
            <span id="swingValue">0%</span>
          </div>
          <input type="range" id="swingSlider" min="0" max="60" value="0">
        </div>
        <div class="switch-row">
          <button class="switch active" data-toggle="metronome">Metronome</button>
          <button class="switch" data-toggle="grid">Grid Mode</button>
        </div>
        <div class="grid-block">
          <div class="grid-label">Accents</div>
          <div class="grid-accent" id="gridAccentRow"></div>
        </div>
      </div>
    </section>

    <section class="panel-wrapper" data-panel="quiz">
      <div class="stack-card quiz-card">
        <div class="quiz-header">
          <div>
            <div class="grid-label">Quiz Breakdown</div>
            <h3 style="margin:0">Name that rudiment</h3>
          </div>
          <div class="chip-row" id="quizTierRow"></div>
        </div>
        <div class="score-grid">
          <div class="score-tile">
            <span>Score</span>
            <strong id="quizScore">0</strong>
          </div>
          <div class="score-tile">
            <span>Rounds</span>
            <strong id="quizRounds">0</strong>
          </div>
          <div class="score-tile">
            <span>Streak</span>
            <strong id="quizStreak">0</strong>
          </div>
        </div>
        <div class="quiz-sheet">
          <div class="quiz-sheet-header">
            <div class="grid-label">Identify the rudiment</div>
            <button class="ghost-btn" id="skipBtn">Skip</button>
          </div>
          <div class="sheet-canvas quiz-sheet-canvas" id="quizSheet"></div>
        </div>
        <div class="quiz-feedback" id="quizFeedback"></div>
        <div class="quiz-choices" id="quizChoices"></div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/vexflow@4.1.0/build/vexflow-min.js"></script>

      quizTierRow: document.getElementById('quizTierRow'),
      quizScore: document.getElementById('quizScore'),
      quizRounds: document.getElementById('quizRounds'),
      quizStreak: document.getElementById('quizStreak'),
      quizSheet: document.getElementById('quizSheet'),
      quizChoices: document.getElementById('quizChoices'),
      quizFeedback: document.getElementById('quizFeedback'),
      skipBtn: document.getElementById('skipBtn')
    };

    let audioCtx = null;

    function init() {
      renderTierOptions();
      renderRudimentOptions();
      renderGridAccentButtons();
      renderQuizTierChips();
      nextQuizPrompt();
      bindEvents();
      updateMentorView();
    }

    function bindEvents() {
      els.tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          state.view = tab.dataset.view;
          els.tabs.forEach(btn => btn.classList.toggle('active', btn === tab));
          els.panels.forEach(panel => {
            panel.classList.toggle('active', panel.dataset.panel === state.view);
          });
        });
      });

      els.tierSelect.addEventListener('change', (e) => {
        state.tier = e.target.value;
        renderRudimentOptions();
        updateMentorView();
      });

      els.rudimentSelect.addEventListener('change', (e) => {
        state.rudimentId = e.target.value;
        updateMentorView();
      });

      els.playBtn.addEventListener('click', togglePlayback);

      els.tempoSlider.addEventListener('input', (e) => {
        state.tempo = Number(e.target.value);
        els.tempoValue.textContent = `${state.tempo} BPM`;
      });

      els.swingSlider.addEventListener('input', (e) => {
        state.swing = Number(e.target.value);
        els.swingValue.textContent = `${state.swing}%`;
      });

      els.switches.forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.toggle;
          if (key === 'metronome') {
            state.metronome = !state.metronome;
            btn.classList.toggle('active', state.metronome);
          } else if (key === 'grid') {
            state.gridMode = !state.gridMode;
            btn.classList.toggle('active', state.gridMode);
            updateGridAccentState();
          }
        });
      });

      els.gridAccentRow.addEventListener('click', (e) => {
        const btn = e.target.closest('.grid-btn');
        if (!btn || btn.classList.contains('disabled')) return;
        const label = btn.dataset.count;
        if (state.gridAccents.has(label)) {
          state.gridAccents.delete(label);
        } else {
          state.gridAccents.add(label);
        }
        renderGridAccentButtons();
      });

      els.skipBtn.addEventListener('click', () => {
        state.quizStreak = 0;
        updateQuizScoreboard();
        nextQuizPrompt();
      });
    }

    function renderTierOptions() {
      els.tierSelect.innerHTML = '';
      TIER_ORDER.forEach(tier => {
        const opt = document.createElement('option');
        opt.value = tier;
        opt.textContent = TIER_LABELS[tier];
        if (tier === state.tier) opt.selected = true;
        els.tierSelect.appendChild(opt);
      });
    }

    function renderRudimentOptions() {
      const options = getRudimentsByTier(state.tier);
      if (!options.find(r => r.id === state.rudimentId)) {
        state.rudimentId = options[0].id;
      }
      els.rudimentSelect.innerHTML = '';
      options.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name;
        if (r.id === state.rudimentId) opt.selected = true;
        els.rudimentSelect.appendChild(opt);
      });
    }

    function updateMentorView() {
      const rudiment = getCurrentRudiment();
      if (!rudiment) return;
      els.tierLabel.textContent = TIER_LABELS[rudiment.tier];
      els.rudimentName.textContent = rudiment.name;
      const notationMeta = getNotationMeta(rudiment.id);
      renderSheet(rudiment.sticking, els.sheetCanvas, { trackNotes: true, notation: notationMeta });
      renderStickingTrack(rudiment.sticking);
    }

    function getNotationMeta(rudimentId) {
      return NOTATION_PRESETS[rudimentId] || { duration: '16' };
    }

    function renderSheet(pattern, target = els.sheetCanvas, options = {}) {
      const container = target;
      if (!container) return;
      container.innerHTML = '';
      const VF = window.Vex?.Flow;
      if (!VF) {
        container.textContent = 'Loading notation...';
        if (options.trackNotes) {
          state.sheetNotes = [];
        }
        return;
      }
      const width = container.clientWidth || container.parentElement.clientWidth || 320;
      const height = 150;
      const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
      renderer.resize(width, height);
      const context = renderer.getContext();
      context.setBackgroundFillStyle('transparent');

      const stave = new VF.Stave(12, 18, width - 24);
      stave.addClef('percussion');
      stave.setContext(context).draw();

      if (!pattern || !pattern.length) {
        if (options.trackNotes) {
          state.sheetNotes = [];
        }
        return;
      }

      const notation = options.notation || {};
      const notes = pattern.map(symbol => createStaveNote(symbol, notation, options));
      const voice = new VF.Voice({ num_beats: Math.max(1, Math.ceil(notes.length / 4)), beat_value: 4 }).setMode(VF.Voice.Mode.SOFT);
      voice.addTickables(notes);
      const beams = VF.Beam.generateBeams(notes, { beam_rests: false });

      new VF.Formatter().joinVoices([voice]).format([voice], width - 80);
      voice.draw(context, stave);
      beams.forEach(beam => beam.setContext(context).draw());

      const noteElements = [];
      notes.forEach(note => {
        const element = note.getElement();
        if (element) {
          element.classList.add('sheet-note');
          noteElements.push(element);
        }
      });

      if (options.trackNotes) {
        state.sheetNotes = noteElements;
      }
    }

    function createStaveNote(symbol, notation, opts = {}) {
      const VF = window.Vex.Flow;
      const duration = notation.duration || '16';
      const note = new VF.StaveNote({
        keys: ['c/5'],
        duration,
        clef: 'percussion',
        stem_direction: 1
      });

      if (opts.showAnnotations !== false) {
        const annotation = new VF.Annotation(formatSymbol(symbol))
          .setFont('SF Pro Display', 12, 'bold')
          .setJustification(VF.Annotation.Justify.CENTER)
          .setVerticalJustification(VF.Annotation.VerticalJustify.BOTTOM);
        note.addAnnotation(0, annotation);
      }

      if (symbol.startsWith('f')) {
        applyGraceNotes(note, 'flam');
      }

      if (symbol.startsWith('d')) {
        applyGraceNotes(note, 'drag');
      }

      return note;
    }

    function applyGraceNotes(note, type) {
      const VF = window.Vex.Flow;
      if (type === 'flam') {
        const grace = new VF.GraceNote({ keys: ['c/5'], duration: '16', slash: false });
        note.addGraceGroup(new VF.GraceNoteGroup([grace], false));
      } else if (type === 'drag') {
        const graceNotes = [
          new VF.GraceNote({ keys: ['c/5'], duration: '32', slash: true }),
          new VF.GraceNote({ keys: ['c/5'], duration: '32', slash: true })
        ];
        note.addGraceGroup(new VF.GraceNoteGroup(graceNotes, false));
      }
    }

    let stickingCells = [];

    function renderStickingTrack(pattern) {
      els.stickingTrack.innerHTML = '';
      stickingCells = pattern.map(symbol => {
        const cell = document.createElement('div');
        const hand = symbol.toUpperCase().includes('R') ? 'hand-right' : 'hand-left';
        cell.className = `sticking-cell ${hand}`;
        cell.textContent = formatSymbol(symbol);
        if (symbol.startsWith('f')) {
          const flam = document.createElement('span');
          flam.className = 'ghost';
          flam.textContent = 'flam';
          cell.appendChild(flam);
        }
        if (symbol.startsWith('d')) {
          const drag = document.createElement('span');
          drag.className = 'ghost';
          drag.textContent = 'drag';
          cell.appendChild(drag);
        }
        els.stickingTrack.appendChild(cell);
        return cell;
      });
    }

    function formatSymbol(symbol) {
      return symbol.toUpperCase().includes('R') ? 'R' : 'L';
    }

    function togglePlayback() {
      state.playing = !state.playing;
      els.playBtn.textContent = state.playing ? 'Stop' : 'Play';
      els.playBtn.classList.toggle('playing', state.playing);
      if (state.playing) {
        startPulse();
      } else {
        stopPulse();
      }
    }

    function startPulse() {
      stopPulse();
      state.subdivisionIndex = 0;
      runStep(0);
    }

    function stopPulse() {
      clearTimeout(state.stepTimer);
      stickingCells.forEach(cell => cell.classList.remove('active', 'accented'));
      state.sheetNotes.forEach(note => note.classList.remove('active', 'accented'));
      state.subdivisionIndex = 0;
    }

    function runStep(idx) {
      const rudiment = getCurrentRudiment();
      if (!rudiment) return;
      stickingCells.forEach(cell => cell.classList.remove('active', 'accented'));
      state.sheetNotes.forEach(note => note.classList.remove('active', 'accented'));
      const cell = stickingCells[idx];
      const note = state.sheetNotes[idx];
      const countIndex = state.subdivisionIndex;
      const countLabel = COUNT_LABELS[countIndex % COUNT_LABELS.length];
      const accent = state.gridMode && state.gridAccents.has(countLabel);
      if (cell) {
        cell.classList.add('active');
        if (accent) cell.classList.add('accented');
      }
      if (note) {
        note.classList.add('active');
        if (accent) note.classList.add('accented');
      }
      if (state.metronome) tick(accent);
      const duration = stepDuration(countIndex);
      state.subdivisionIndex = (countIndex + 1) % COUNT_LABELS.length;
      state.stepTimer = setTimeout(() => {
        if (!state.playing) return;
        const nextIndex = (idx + 1) % rudiment.sticking.length;
        runStep(nextIndex);
      }, duration);
    }

    function stepDuration(stepIndex) {
      const sixteenth = (60 / state.tempo) * 1000 / 4;
      if (state.swing === 0) return sixteenth;
      const swingRatio = state.swing / 100 * 0.5;
      const label = COUNT_LABELS[stepIndex % COUNT_LABELS.length];
      const longBeat = label === '1' || label === '&';
      return longBeat ? sixteenth * (1 + swingRatio) : sixteenth * (1 - swingRatio);
    }

    function tick(accent = false) {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = accent ? 1400 : 900;
      gain.gain.value = accent ? 0.25 : 0.12;
      osc.connect(gain).connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      osc.start(now);
      osc.stop(now + 0.08);
    }

    function renderGridAccentButtons() {
      els.gridAccentRow.innerHTML = '';
      COUNT_LABELS.forEach(label => {
        const btn = document.createElement('button');
        btn.className = 'grid-btn';
        const isActive = state.gridAccents.has(label);
        if (isActive) btn.classList.add('active');
        if (!state.gridMode) {
          btn.classList.add('disabled');
          btn.setAttribute('aria-disabled', 'true');
        } else {
          btn.removeAttribute('aria-disabled');
        }
        btn.setAttribute('aria-pressed', isActive);
        btn.dataset.count = label;
        btn.textContent = label;
        els.gridAccentRow.appendChild(btn);
      });
    }

    function updateGridAccentState() {
      renderGridAccentButtons();
    }

    function renderQuizTierChips() {
      els.quizTierRow.innerHTML = '';
      TIER_ORDER.forEach(tier => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        if (tier === state.quizTier) chip.classList.add('active');
        chip.textContent = TIER_LABELS[tier];
        chip.addEventListener('click', () => {
          state.quizTier = tier;
          els.quizTierRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          state.quizStreak = 0;
          nextQuizPrompt();
        });
        els.quizTierRow.appendChild(chip);
      });
    }

    function nextQuizPrompt() {
      if (state.quizAdvanceTimer) {
        clearTimeout(state.quizAdvanceTimer);
        state.quizAdvanceTimer = null;
      }
      const pool = getRudimentsByTier(state.quizTier);
      if (!pool.length) return;
      state.quizPrompt = pool[Math.floor(Math.random() * pool.length)];
      state.quizChoices = buildQuizChoices(pool, state.quizPrompt);
      state.quizAnswered = false;
      setQuizFeedback('');
      state.quizRounds += 1;
      updateQuizScoreboard();
      renderQuizQuestion();
      renderQuizChoices();
    }

    function buildQuizChoices(pool, answer) {
      const incorrect = pool.filter(r => r.id !== answer.id);
      const picks = [];
      while (picks.length < 3 && incorrect.length) {
        const idx = Math.floor(Math.random() * incorrect.length);
        picks.push(incorrect.splice(idx, 1)[0]);
      }
      const options = [...picks, answer];
      return options.sort(() => Math.random() - 0.5);
    }

    function renderQuizQuestion() {
      if (!state.quizPrompt) return;
      const notationMeta = getNotationMeta(state.quizPrompt.id);
      renderSheet(state.quizPrompt.sticking, els.quizSheet, { notation: notationMeta, showAnnotations: false });
    }

    function renderQuizChoices() {
      els.quizChoices.innerHTML = '';
      state.quizChoices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'quiz-choice';
        btn.textContent = choice.name;
        btn.addEventListener('click', () => handleQuizChoice(choice.id, btn));
        els.quizChoices.appendChild(btn);
      });
    }

    function handleQuizChoice(choiceId, btn) {
      if (!state.quizPrompt || state.quizAnswered) return;
      if (choiceId === state.quizPrompt.id) {
        state.quizScore += 1;
        state.quizStreak += 1;
        state.quizAnswered = true;
        btn.classList.add('correct');
        setQuizFeedback('Correct!');
        updateQuizScoreboard();
        if (state.quizAdvanceTimer) clearTimeout(state.quizAdvanceTimer);
        state.quizAdvanceTimer = setTimeout(() => nextQuizPrompt(), 900);
      } else {
        btn.classList.add('incorrect');
        state.quizStreak = 0;
        setQuizFeedback('Not quite. Try again.');
        updateQuizScoreboard();
      }
    }

    function setQuizFeedback(message) {
      state.quizFeedback = message;
      els.quizFeedback.textContent = message;
      els.quizFeedback.classList.toggle('active', Boolean(message));
      els.quizFeedback.classList.toggle('success', message === 'Correct!');
      els.quizFeedback.classList.toggle('error', message && message !== 'Correct!');
    }

    function updateQuizScoreboard() {
      els.quizScore.textContent = state.quizScore;
      els.quizRounds.textContent = state.quizRounds;
      els.quizStreak.textContent = state.quizStreak;
    }

    function getRudimentsByTier(tier) {
      return RUDIMENT_LIBRARY.filter(r => r.tier === tier);
    }

    function getCurrentRudiment() {
      return RUDIMENT_LIBRARY.find(r => r.id === state.rudimentId);
    }

    window.addEventListener('beforeunload', () => stopPulse());

    init();
  </script>
</body>
</html>

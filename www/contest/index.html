<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/assets/StickWithItBlack.png" sizes="256x256">
  <link rel="shortcut icon" href="/assets/StickWithItBlack.png">
  <title>Contest | Stick With It</title>
  <meta name="description" content="Stick With It monthly play-along contest hub with contest details, play-along media, voting, and past winners.">
  <link rel="stylesheet" href="/assets/nav.css?v=20260707a">
  <link rel="stylesheet" href="/assets/contest.css?v=20260707a">
  <script src="/assets/nav.js?v=20260707b" defer></script>
  <script src="/assets/contest.js?v=20260707a" defer></script>
</head>
<body>
  <main class="contest-page">
    <section class="contest-hero" aria-labelledby="contest-title">
      <div class="contest-hero__copy">
        <div class="contest-countdown is-loading" id="contest-countdown" aria-live="polite"></div>
        <p class="contest-kicker">Stick With It Contest</p>
        <h1 id="contest-title">Contest</h1>
        <div class="contest-description" id="contest-description"></div>
        <div class="contest-actions">
          <a class="contest-action contest-action--primary" href="#contest-entries">Vote on entries</a>
          <a class="contest-action" href="/submit/">Submit a clip</a>
        </div>
        <p class="contest-prize" id="contest-prize" hidden></p>
      </div>
      <div class="contest-hero__media">
        <div id="contest-video"></div>
        <section class="contest-tracks" aria-labelledby="contest-tracks-title">
          <div class="contest-section-head">
            <h2 id="contest-tracks-title">Play-Along Track</h2>
          </div>
          <div id="contest-tracks"></div>
        </section>
      </div>
    </section>

    <section class="contest-section contest-steps" aria-labelledby="contest-steps-title">
      <div class="contest-section-head">
        <h2 id="contest-steps-title">How To Enter</h2>
      </div>
      <div class="contest-step-grid" id="contest-steps"></div>
    </section>

    <section class="contest-section contest-entries" id="contest-entries" aria-labelledby="contest-entries-title">
      <div class="contest-section-head contest-section-head--split">
        <div>
          <p class="contest-kicker">Current Vote</p>
          <h2 id="contest-entries-title">Current Entries</h2>
        </div>
        <a class="contest-action" href="/submit/">Submit for next month</a>
      </div>
      <div class="contest-entry-grid" id="vote-grid" aria-live="polite"></div>
    </section>

    <section class="contest-section contest-archive" id="contest-archive-section" aria-labelledby="contest-archive-title" hidden>
      <div class="contest-section-head">
        <p class="contest-kicker">Past Contests</p>
        <h2 id="contest-archive-title">Archive</h2>
      </div>
      <div class="contest-archive-grid" id="contest-archive"></div>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/assets/StickWithItBlack.png" sizes="256x256">
  <link rel="shortcut icon" href="/assets/StickWithItBlack.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick With It | Drummers Unite!</title>
    <style>
        :root {
            --bg: #000;
            --surface: #111;
            --border: #333;
            --text: #fff;
            --text-muted: #ccc;
            --text-dim: #666;
            --accent: #e63946;
            --accent-hover: #000;
            --border-top: #222;
        }

        html[data-theme="light"] {
            --bg: #fff;
            --surface: #f5f5f5;
            --border: #ddd;
            --text: #000;
            --text-muted: #333;
            --text-dim: #888;
            --accent: #e63946;
            --accent-hover: #fff;
            --border-top: #eee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .theme-toggle {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .toggle-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            border: 1px solid var(--border);
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 24px;
            height: 24px;
            background: var(--text);
            border-radius: 12px;
            transition: left 0.3s ease;
        }

        .toggle-switch.active .toggle-slider {
            left: 24px;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .welcome {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 2.5rem 0 1rem;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-links a {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 4px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .social-links a:hover {
            background: var(--accent);
            color: var(--accent-hover);
        }

        .apps {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-top);
        }

        .apps-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .app-button {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1.25rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.2s ease;
        }

        .app-button:hover {
            background: var(--border);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .app-button .emoji {
            font-size: 1.4rem;
            margin-right: 0.5rem;
        }

        .app-button.secret {
            width: 80px;
            height: 80px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .app-button.secret:hover {
            background: var(--border);
            border-color: var(--border);
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <span class="toggle-label">Dark</span>
        <div class="toggle-switch" id="themeToggle">
            <div class="toggle-slider"></div>
        </div>
        <span class="toggle-label">Light</span>
    </div>

    <div class="container">
        <img src="/assets/StickWithItBlack.png" alt="Stick With It" class="logo">
        <h1>STICK WITH IT</h1>
        <p class="tagline">Drummers Unite!</p>
        
        <p class="welcome">Thanks for being here.</p>
        <p class="welcome">Links to the latest stuff below</p>

        <p class="section-title">Connect</p>
        <div class="social-links">
            <a href="https://www.youtube.com/stickwithit" target="_blank">YouTube</a>
            <a href="https://discord.com/invite/yCbGA8X" target="_blank">Discord</a>
            <a href="/blog/">Blog</a>
            <a href="https://forms.gle/ewFvNa8CexqMWuAN6" target="_blank">Submit Video</a>
        </div>

        <div class="apps">
            <div class="apps-list">
                <a href="/apps/metrognome/" class="app-button">
                    <span class="emoji">🥁</span>
                    <span>MetroGnome</span>
                </a>
                <a href="/apps/chopmeister/" class="app-button">
                    <span class="emoji">🎸</span>
                    <span>Chopmeister</span>
                </a>
                <a href="/apps/gigasector/" class="app-button">
                    <span class="emoji">✂️</span>
                    <span>Gigasector ✂️</span>
                </a>
                <a href="/apps/rudimentor/" class="app-button">
                    <span class="emoji">🥚</span>
                    <span>Rudimentor</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Initialize theme from localStorage or system preference
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Get saved theme or default to 'dark'
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        
        // Set toggle state
        if (savedTheme === 'light') {
            themeToggle.classList.add('active');
        }

        // Handle theme toggle
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.classList.toggle('active');
        });
    </script>
</body>
</html>
